# ============================================================
# API Gateway — NGINX Configuration
# Task 3: Routes all /api/* traffic to correct microservices
# Port 8080
# ============================================================

# ── Upstream Backends ─────────────────────────────────────────
upstream farmer_service {
    server farmer-service:8081;
    keepalive 16;
}

upstream crop_service {
    server crop-service:8082;
    keepalive 16;
}

upstream scheme_service {
    server scheme-service:8083;
    keepalive 16;
}

# ── Rate Limit Zones ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# ── Server Block ──────────────────────────────────────────────
server {
    listen      8080;
    server_name localhost api-gateway;

    # Security Headers
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Api-Gateway           "AgriPortal-v1" always;

    # CORS — allow Angular UI
    add_header Access-Control-Allow-Origin  "*"                                         always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH"    always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept"       always;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Gateway Health ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"OK","gateway":"api-gateway","version":"1.0"}';
        add_header Content-Type application/json;
    }

    # ── Farmer Service ─ /api/farmers/* ────────────────────
    location /api/farmers {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://farmer_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffering
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 16k;
    }

    # ── Crop Service ─ /api/crops/* ────────────────────────
    location /api/crops {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://crop_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Scheme Service ─ /api/schemes/* ────────────────────
    location /api/schemes {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://scheme_service;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Catch-all 404 ───────────────────────────────────────
    location / {
        return 404 '{"success":false,"message":"Route not found. Available: /api/farmers /api/crops /api/schemes"}';
        add_header Content-Type application/json;
    }

    # ── Error Pages ─────────────────────────────────────────
    error_page 502 503 504 /gateway_error.json;
    location = /gateway_error.json {
        internal;
        return 503 '{"success":false,"message":"Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}
